<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Tracker - Automatic Test Suite</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            border-bottom: 2px solid #29292e;
            padding-bottom: 10px;
            font-size: 24px;
        }
        .test-group {
            background: #202024;
            border: 1px solid #29292e;
            border-radius: 8px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .test-group-header {
            background: #29292e;
            padding: 10px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-case {
            padding: 10px 15px;
            border-bottom: 1px solid #29292e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .test-case:last-child {
            border-bottom: none;
        }
        .test-name {
            flex: 1;
            min-width: 250px;
        }
        .status-pass {
            color: #04d361;
            font-weight: bold;
        }
        .status-fail {
            color: #f75a68;
            font-weight: bold;
        }
        .summary {
            background: #202024;
            border: 1px solid #29292e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .btn-run {
            background: #04d361;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-run:hover {
            opacity: 0.9;
        }
        #app-frame {
            width: 100%;
            height: 500px;
            border: 1px solid #29292e;
            border-radius: 8px;
            background: #000;
            margin-top: 20px;
        }
        .log-area {
            background: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 10px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            margin-top: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Physics Tracker - 自動テストスイート</h1>
        
        <div class="summary" id="test-summary">
            テストがまだ実行されていません。「テスト実行」ボタンを押してください。
        </div>
        
        <button class="btn-run" id="btn-run-tests">テスト実行</button>
        
        <div id="test-results">
            <!-- テスト結果がここに挿入されます -->
        </div>

        <h3>アプリケーションプレビュー (テスト用)</h3>
        <iframe id="app-frame" src="index.html"></iframe>

        <h3>テストログ</h3>
        <div class="log-area" id="log-output"></div>
    </div>

    <script>
        const iframe = document.getElementById('app-frame');
        const logOutput = document.getElementById('log-output');
        const summaryDiv = document.getElementById('test-summary');
        const resultsDiv = document.getElementById('test-results');
        const runBtn = document.getElementById('btn-run-tests');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logOutput.textContent += `[${time}] ${msg}\n`;
            logOutput.scrollTop = logOutput.scrollHeight;
            console.log(`[TEST] ${msg}`);
        }

        function clearLog() {
            logOutput.textContent = '';
        }

        function assert(cond, msg) {
            if (!cond) throw new Error(msg || "Assertion failed");
        }

        function assertEq(actual, expected, msg) {
            if (actual !== expected) {
                throw new Error(`${msg || "Assertion failed"}: expected ${expected}, got ${actual}`);
            }
        }

        function assertClose(actual, expected, tolerance = 0.001, msg = "") {
            if (Math.abs(actual - expected) > tolerance) {
                throw new Error(`${msg}: expected close to ${expected} (tol ${tolerance}), got ${actual}`);
            }
        }

        const testGroups = [];

        function addTestGroup(name, cases) {
            testGroups.push({ name, cases });
        }

        const wait = (ms) => new Promise(r => setTimeout(r, ms));
        async function waitFor(cond, timeoutMs, label) {
            const t0 = Date.now();
            while (Date.now() - t0 < timeoutMs) { if (cond()) return; await wait(120); }
            throw new Error('タイムアウト: ' + (label || 'condition'));
        }
        // seeked を待つ（同一時刻でseekedが来ない場合に備えてタイムアウト併用）
        function seekAndWait(win, n, timeoutMs = 2000) {
            return new Promise(resolve => {
                const v = win.appState.videoElement;
                let done = false;
                const h = () => { if (done) return; done = true; v.removeEventListener('seeked', h); resolve(); };
                v.addEventListener('seeked', h);
                win.seekToFrame(n);
                setTimeout(() => { if (!done) { done = true; v.removeEventListener('seeked', h); resolve(); } }, timeoutMs);
            });
        }

        // --- フェーズ1: 実動画ロードとフレーム時刻表 ---
        addTestGroup("フェーズ1: 実動画ロードとフレーム時刻表", [
            {
                name: "appState / video / canvas 要素が存在すること",
                fn: async (win) => {
                    assert(win.appState, "appStateが存在");
                    assert(win.appState.videoElement, "videoElementが存在");
                    assert(win.appState.canvas && win.appState.ctx, "canvas/ctxが存在");
                }
            },
            {
                name: "サンプル動画を読み込みデコード完了を待つ",
                fn: async (win) => {
                    win.document.getElementById('btn-load-sample').click();
                    await waitFor(() => win.appState.videoElement.readyState >= 2 && win.appState.videoDuration > 0, 20000, '動画メタデータ');
                    log(`動画ロード完了: ${win.appState.videoElement.videoWidth}x${win.appState.videoElement.videoHeight}, ${win.appState.videoDuration.toFixed(2)}s`);
                }
            },
            {
                name: "プレビュー再生＋FPS実測＋フレーム時刻表の構築を待つ",
                fn: async (win) => {
                    await waitFor(() => win.appState.isPreviewing === false && win.appState.totalFrames > 0, 25000, 'プレビュー完了');
                    log(`fps=${win.appState.videoFps}, totalFrames=${win.appState.totalFrames}, frameTimes=${win.appState.frameTimes.length}`);
                    assert(win.appState.frameTimes.length >= 11, "実フレーム時刻表が構築されていること");
                    assertEq(win.appState.totalFrames, win.appState.frameTimes.length - 1, "totalFrames=frameTimes.length-1 (コマと1:1)");
                }
            },
            {
                name: "プレビュー後は先頭フレーム(0)に戻ること",
                fn: async (win) => {
                    assertEq(win.appState.currentFrame, 0, "currentFrameが0");
                }
            },
            {
                name: "フレーム送りでコマ時刻が単調増加すること（重複なし）",
                fn: async (win) => {
                    let prev = -1;
                    for (let n = 0; n <= win.appState.totalFrames; n++) {
                        await seekAndWait(win, n);
                        const t = win.frameTimeOf(n);
                        assert(t > prev, `frame ${n} の時刻 ${t.toFixed(4)} が直前より大きい（末尾重複なし）`);
                        prev = t;
                    }
                }
            },
            {
                name: "シーク境界クランプ",
                fn: async (win) => {
                    await seekAndWait(win, -5);
                    assertEq(win.appState.currentFrame, 0, "0未満は0");
                    await seekAndWait(win, win.appState.totalFrames + 10);
                    assertEq(win.appState.currentFrame, win.appState.totalFrames, "超過は最大値");
                    await seekAndWait(win, 0);
                }
            }
        ]);

        // --- フェーズ2: 主要動線（原点・スケール・トラック・出力） ---
        addTestGroup("フェーズ2: 主要動線（原点/スケール/トラック/出力）", [
            {
                name: "原点を設定できること",
                fn: async (win) => {
                    win.setPendingCapture('origin');
                    win.confirmAtCrosshair();
                    assert(!!win.appState.calibration.origin, "原点が設定されること");
                }
            },
            {
                name: "スケールを設定できること（2点＋実寸入力）",
                fn: async (win) => {
                    win.setPendingCapture('scale');
                    win.confirmAtCrosshair();
                    win.appState.viewState.offsetX -= 200; // 十字が指す動画座標をずらす
                    win.confirmAtCrosshair();
                    const inp = win.document.getElementById('dialog-input-val');
                    assert(!!inp, "スケール入力ダイアログが出ること");
                    inp.value = '50';
                    win.document.getElementById('dialog-btn-ok').click();
                    win.resetZoom();
                    const r = win.appState.calibration.scaleRatio;
                    assert(isFinite(r) && r > 0, `scaleRatioが正の有限値 (${r ? r.toFixed(4) : 'n/a'} cm/px)`);
                }
            },
            {
                name: "トラック点を確定で登録できること（自動コマ送り）",
                fn: async (win) => {
                    win.test_setVars({ trackingData: [] });
                    await seekAndWait(win, 0);
                    win.setPendingCapture(null);
                    for (let k = 0; k < 4; k++) { win.confirmAtCrosshair(); await wait(120); }
                    assert(win.appState.trackingData.length >= 3, `点が複数登録される (${win.appState.trackingData.length}点)`);
                    const f0 = win.appState.trackingData[0].frame;
                    const f1 = win.appState.trackingData[1].frame;
                    assert(f1 > f0, "確定ごとにフレームが進む");
                }
            },
            {
                name: "選択ポイントを削除できること",
                fn: async (win) => {
                    const before = win.appState.trackingData.length;
                    const id = win.appState.trackingData[0].id;
                    win.deletePoint(id);
                    assertEq(win.appState.trackingData.length, before - 1, "1点削除されること");
                }
            },
            {
                name: "データ表ヘッダがスケール設定後 cm 表記になること",
                fn: async (win) => {
                    const th = win.document.querySelectorAll('#data-table thead th')[1].textContent;
                    assert(/cm/.test(th), `ヘッダが cm 表記 (${th})`);
                }
            },
            {
                name: "出力TSVにヘッダとデータ行が含まれること",
                fn: async (win) => {
                    win.document.getElementById('btn-export').click();
                    const ta = win.document.querySelector('#dialog-body textarea');
                    assert(!!ta, "エクスポートのテキストエリアが出ること");
                    const tsv = ta.value;
                    assert(/object_id\tframe/.test(tsv.split('\n')[0]), "正しいヘッダ行");
                    assert(tsv.trim().split('\n').length >= 3, "ヘッダ＋データ行がある");
                    win.document.getElementById('dialog-btn-cancel').click();
                }
            }
        ]);

        // --- フェーズ3: グラフ複数表示 ---
        addTestGroup("フェーズ3: グラフ複数表示", [
            {
                name: "既定で y-t / v-t の2枚が縦積みされること",
                fn: async (win) => {
                    const checked = [...win.document.querySelectorAll('#graph-type-checklist input:checked')].map(b => b.value);
                    assertEq(checked.join(','), 'y-t,v-t', "既定チェックは y-t,v-t");
                    const types = [...win.document.querySelectorAll('#graph-stack canvas')].map(c => c.dataset.type);
                    assertEq(types.join(','), 'y-t,v-t', "ミニグラフが2枚 (y-t,v-t)");
                }
            },
            {
                name: "チェック追加でグラフが増えること",
                fn: async (win) => {
                    const ax = win.document.querySelector('#graph-type-checklist input[value="a-t"]');
                    ax.checked = true; ax.dispatchEvent(new Event('change', { bubbles: true }));
                    const types = [...win.document.querySelectorAll('#graph-stack canvas')].map(c => c.dataset.type);
                    assertEq(types.length, 3, "3枚に増える");
                    assertEq(types[2], 'a-t', "末尾が a-t");
                    ax.checked = false; ax.dispatchEvent(new Event('change', { bubbles: true }));
                }
            }
        ]);

        // --- フェーズ4: 座標変換・レターボックス（純粋計算。最後に実行：videoElementをスタブ化するため） ---
        addTestGroup("フェーズ4: 座標変換・レターボックス（純粋計算）", [
            {
                name: "ズームリセットが動作すること",
                fn: async (win) => {
                    win.appState.viewState = { scale: 2, offsetX: 100, offsetY: 50 };
                    win.resetZoom();
                    assertEq(win.appState.viewState.scale, 1, "scale=1");
                    assertEq(win.appState.viewState.offsetX, 0, "offsetX=0");
                    assertEq(win.appState.viewState.offsetY, 0, "offsetY=0");
                }
            },
            {
                name: "アスペクト一致（余白0）の往復変換",
                fn: async (win) => {
                    win.test_setVars({
                        canvas: { width: 800, height: 600 },
                        videoElement: { videoWidth: 1600, videoHeight: 1200 },
                        viewState: { scale: 1, offsetX: 0, offsetY: 0 }
                    });
                    const vPos = win.canvasToVideo(400, 300);
                    assertClose(vPos.x, 800, 0.1, "Canvas(400,300)→Video(800,600) X");
                    assertClose(vPos.y, 600, 0.1, "Canvas(400,300)→Video(800,600) Y");
                    const cPos = win.videoToCanvas(800, 600);
                    assertClose(cPos.x, 400, 0.1, "逆変換 X");
                    assertClose(cPos.y, 300, 0.1, "逆変換 Y");
                }
            },
            {
                name: "縦長動画のレターボックス（横幅の中央を使える）",
                fn: async (win) => {
                    win.test_setVars({
                        canvas: { width: 1000, height: 400 },
                        videoElement: { videoWidth: 1080, videoHeight: 1920 },
                        viewState: { scale: 1, offsetX: 0, offsetY: 0 }
                    });
                    const m = win.getFitMetrics();
                    assertClose(m.fit, 400 / 1920, 0.0001, "fitは高さ基準");
                    assert(m.baseX > 0, "左右に余白(baseX>0)");
                    assertClose(m.baseY, 0, 0.01, "上下の余白は0");
                    const cPos = win.videoToCanvas(540, 960);
                    assertClose(cPos.x, 500, 0.1, "動画中央→Canvas中央 X (横幅中央)");
                    assertClose(cPos.y, 200, 0.1, "動画中央→Canvas中央 Y");
                }
            },
            {
                name: "物理座標変換（原点オフセット＋スケール cm）",
                fn: async (win) => {
                    win.test_setVars({ calibration: { origin: { x: 500, y: 500 }, scaleRatio: 2.5 } });
                    const pt = { x: 600, y: 400 };
                    const physX = (pt.x - win.appState.calibration.origin.x) * win.appState.calibration.scaleRatio;
                    const physY = (win.appState.calibration.origin.y - pt.y) * win.appState.calibration.scaleRatio;
                    assertClose(physX, 250, 0.1, "物理X=250cm");
                    assertClose(physY, 250, 0.1, "物理Y=250cm (Y軸反転)");
                }
            }
        ]);

        async function runTests() {
            clearLog();
            resultsDiv.innerHTML = '';
            summaryDiv.textContent = "テスト実行中...";
            summaryDiv.style.background = "#202024";
            
            log("iframeを再読み込みします...");
            iframe.src = iframe.src;
            await new Promise(resolve => iframe.onload = resolve);
            log("iframeロード完了");
            
            const win = iframe.contentWindow;
            
            let passedCount = 0;
            let failedCount = 0;
            let totalCount = 0;

            for (const group of testGroups) {
                log(`グループ開始: ${group.name}`);
                
                const groupDiv = document.createElement('div');
                groupDiv.className = 'test-group';
                
                const header = document.createElement('div');
                header.className = 'test-group-header';
                header.innerHTML = `<span>${group.name}</span><span class="group-status">実行中...</span>`;
                groupDiv.appendChild(header);
                
                const casesContainer = document.createElement('div');
                groupDiv.appendChild(casesContainer);
                resultsDiv.appendChild(groupDiv);

                let groupFailed = false;

                for (const tcase of group.cases) {
                    totalCount++;
                    log(`テストケース実行: ${tcase.name}`);
                    
                    const caseDiv = document.createElement('div');
                    caseDiv.className = 'test-case';
                    caseDiv.innerHTML = `<span class="test-name">${tcase.name}</span><span class="status-running">実行中...</span>`;
                    casesContainer.appendChild(caseDiv);

                    try {
                        await tcase.fn(win);
                        caseDiv.querySelector('span:last-child').className = 'status-pass';
                        caseDiv.querySelector('span:last-child').textContent = 'PASS';
                        passedCount++;
                        log(`PASS: ${tcase.name}`);
                    } catch (err) {
                        caseDiv.querySelector('span:last-child').className = 'status-fail';
                        caseDiv.querySelector('span:last-child').textContent = 'FAIL';
                        const errMsg = document.createElement('div');
                        errMsg.style.color = '#f75a68';
                        errMsg.style.fontSize = '12px';
                        errMsg.style.width = '100%';
                        errMsg.style.padding = '4px 0 0 0';
                        errMsg.textContent = err.message;
                        caseDiv.appendChild(errMsg);
                        failedCount++;
                        groupFailed = true;
                        log(`FAIL: ${tcase.name} - ${err.message}`);
                    }
                }

                header.querySelector('.group-status').textContent = groupFailed ? '一部失敗' : '合格';
                header.querySelector('.group-status').style.color = groupFailed ? '#f75a68' : '#04d361';
            }

            summaryDiv.textContent = `テスト終了: 全 ${totalCount} 件中 ${passedCount} 件合格, ${failedCount} 件不合格`;
            if (failedCount === 0) {
                summaryDiv.style.background = "rgba(4, 211, 97, 0.2)";
                summaryDiv.style.border = "1px solid #04d361";
                log("全テスト合格！");
            } else {
                summaryDiv.style.background = "rgba(247, 90, 104, 0.2)";
                summaryDiv.style.border = "1px solid #f75a68";
                log("テスト失敗あり");
            }
        }

        runBtn.addEventListener('click', runTests);
        
        window.addEventListener('load', () => {
            setTimeout(runTests, 1500);
        });
    </script>
</body>
</html>
